<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Peers Unity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --bg: #0F172A; --card-bg: #1E293B; --text: #F8FAFC; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { max-width: 400px; padding: 40px 24px; background: #1E293B; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); margin: 20px; }
        .logo { width: 88px; height: 88px; margin-bottom: 24px; border-radius: 20px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0 0 12px; color: white; }
        p { font-size: 15px; color: #94A3B8; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 16px; transition: all 0.2s; box-sizing: border-box; cursor: pointer; border: none; }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 4px 14px 0 rgba(74, 144, 226, 0.3); }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); color: white; background: transparent; }
        .loader { width: 40px; height: 40px; border: 4px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-bottom: 20px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ref-badge { display: inline-block; background: rgba(74, 144, 226, 0.1); color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 16px; border: 1px solid rgba(74, 144, 226, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader"></div>
        <h1 id="title">Opening Peers Unity...</h1>
        <div id="ref-display" class="ref-badge" style="display: none;"></div>
        <p id="description">We're opening the app to apply your referral benefits.</p>
        
        <div id="app-actions">
            <button onclick="openApp()" class="btn btn-primary">Open Peers Unity App</button>
        </div>

        <div id="store-actions" style="display: none; margin-top: 20px;">
            <p style="margin-bottom: 15px;">New to Peers Unity? Download the app:</p>
            <a href="https://play.google.com/store/apps/details?id=com.peers.peersunity" class="btn btn-outline" target="_blank">Get it on Play Store</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || '';
        // CORRECT PACKAGE ID: com.peers.peersunity
        const PACKAGE_ID = 'com.peers.peersunity';
        
        if (refCode) {
            const badge = document.getElementById('ref-display');
            badge.innerText = 'Referral Code: ' + refCode;
            badge.style.display = 'inline-block';
        }

        function openApp() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(userAgent);
            
            if (isAndroid) {
                // Correct android intent using com.peers.peersunity
                const intentUrl = `intent://register?ref=${refCode}#Intent;scheme=peersunity;package=${PACKAGE_ID};end`;
                window.location.href = intentUrl;
            } else {
                window.location.replace(`peersunity://register?ref=${refCode}`);
            }

            // If the app isn't installed after 1.5 seconds, show the store links
            setTimeout(() => {
                if (!document.hidden) {
                    document.getElementById('store-actions').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('title').innerText = 'App not detected?';
                    document.getElementById('description').innerText = 'Please click the button above to open the app, or download it from the store below.';
                }
            }, 1500);
        }

        window.onload = () => {
             // Delay auto-open slightly for stability
             setTimeout(openApp, 500);
        };
    </script>
</body>
</html>
